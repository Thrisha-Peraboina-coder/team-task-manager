{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Create Account</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Sign Up</button>
  </form>
  <p>Have an account? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
