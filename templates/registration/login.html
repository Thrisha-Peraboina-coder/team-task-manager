{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Welcome Back</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Login</button>
  </form>
  <p>No account? <a href="{% url 'signup' %}">Sign up</a></p>
</div>
{% endblock %}
